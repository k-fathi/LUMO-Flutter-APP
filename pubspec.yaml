name: lumo_ai
description: "A comprehensive medical app for parents and doctors to monitor children's health with AI assistance"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2
  get_it: ^7.6.7

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9
  firebase_messaging: ^14.7.19

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Styling
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Utilities
  intl: ^0.20.2
  image_picker: ^1.0.7
  file_picker: ^6.2.0
  url_launcher: ^6.2.5
  share_plus: ^7.2.2
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  uuid: ^4.3.3

  # Networking
  http: ^1.2.1
  dio: ^5.4.1

  # Icons
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.7.0

  # Other
  equatable: ^2.0.5
  flutter_slidable: ^3.0.1
  pull_to_refresh: ^2.0.0
  flutter_local_notifications: ^20.1.0
  timeago: ^3.7.1
  fl_chart: ^1.1.1
  iconly: ^1.0.1

  path: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images_from_web/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/lumo-logo.png"
  min_sdk_android: 21

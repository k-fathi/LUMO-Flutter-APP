<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Modern Gradient -->
    <linearGradient id="lumoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo -->
      <stop offset="50%" stop-color="#06B6D4" /> <!-- Cyan -->
      <stop offset="100%" stop-color="#10B981" /> <!-- Emerald -->
    </linearGradient>
    
    <!-- Soft Drop Shadow for the Icon -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background (None for transparency) -->

  <!-- Icon Group -->
  <g transform="translate(512, 420)" filter="url(#shadow)">
    <!-- Abstract Heart / Brain / Leaf motif representing Care & Growth -->
    <!-- Left Leaf/Lobe -->
    <path d="M 0,100 C -150,100 -220,0 -150,-100 C -80,-200 0,-100 0,-20" fill="url(#lumoGrad)" opacity="0.9" />
    <!-- Right Leaf/Lobe -->
    <path d="M 0,100 C 150,100 220,0 150,-100 C 80,-200 0,-100 0,-20" fill="url(#lumoGrad)" opacity="0.75" />
    
    <!-- Central Connection node -->
    <circle cx="0" cy="-40" r="40" fill="#FFFFFF" />
    <circle cx="0" cy="-40" r="28" fill="url(#lumoGrad)" />
  </g>

  <!-- Typography: Lumo -->
  <text x="512" y="780" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-weight="900" 
        font-size="200" 
        fill="url(#lumoGrad)" 
        text-anchor="middle" 
        letter-spacing="-4">Lumo</text>

  <!-- Subtitle -->
  <text x="512" y="860" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-weight="700" 
        font-size="46" 
        fill="#64748B" 
        text-anchor="middle" 
        letter-spacing="14">AUTISM SUPPORT</text>

</svg>
